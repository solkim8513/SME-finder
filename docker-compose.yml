version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sme_finder
      POSTGRES_USER: sme_user
      POSTGRES_PASSWORD: sme_pass
    volumes:
      - sme_pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5433:5432"     # exposed on 5433 to avoid conflict with other Postgres instances
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sme_user -d sme_finder"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://sme_user:sme_pass@db:5432/sme_finder
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3100}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-SME Finder <noreply@example.com>}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3100}
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src   # live reload in dev

  client:
    build: ./client
    environment:
      VITE_API_URL: http://server:5001
    ports:
      - "3100:3100"
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src   # live reload in dev

volumes:
  sme_pgdata:
